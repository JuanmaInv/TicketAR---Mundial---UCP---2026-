<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1040" viewBox="0 0 1800 1040" role="img" aria-labelledby="title desc">
  <title id="title">Diagrama UML de clases de TicketAR</title>
  <desc id="desc">Diagrama horizontal con entidades, servicios, repositorios, estados, estrategias de pago y notificaciones del backend TicketAR.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .head { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
      .iface .head { fill: #ede9fe; stroke: #7c3aed; }
      .iface .box { stroke: #7c3aed; }
      .impl .head { fill: #dcfce7; stroke: #16a34a; }
      .impl .box { stroke: #16a34a; }
      .service .head { fill: #ffedd5; stroke: #ea580c; }
      .service .box { stroke: #ea580c; }
      .external .head { fill: #fef9c3; stroke: #ca8a04; }
      .external .box { stroke: #ca8a04; }
      .title { font: 700 19px Arial, sans-serif; fill: #0f172a; }
      .stereo { font: italic 13px Arial, sans-serif; fill: #475569; }
      .text { font: 15px Consolas, "Courier New", monospace; fill: #0f172a; }
      .label { font: 13px Arial, sans-serif; fill: #334155; }
      .rel { fill: none; stroke: #475569; stroke-width: 2; marker-end: url(#arrow); }
      .dep { fill: none; stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 5; marker-end: url(#arrow); }
      .gen { fill: none; stroke: #334155; stroke-width: 2; stroke-dasharray: 7 5; marker-end: url(#triangle); }
      .comp { fill: none; stroke: #334155; stroke-width: 2; marker-end: url(#diamond); }
      .section { font: 700 17px Arial, sans-serif; fill: #1e293b; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="triangle" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
    </marker>
    <marker id="diamond" viewBox="0 0 14 14" refX="13" refY="7" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 1 7 L 7 1 L 13 7 L 7 13 z" fill="#334155"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1040"/>
  <text class="section" x="50" y="42">Dominio</text>
  <text class="section" x="480" y="42">Servicios</text>
  <text class="section" x="900" y="42">Interfaces y fabricas</text>
  <text class="section" x="1335" y="42">Implementaciones</text>

  <g id="UsuarioEntidad">
    <rect class="box" x="50" y="80" width="310" height="190"/>
    <rect class="head" x="50" y="80" width="310" height="46"/>
    <text class="title" x="205" y="110" text-anchor="middle">UsuarioEntidad</text>
    <text class="text" x="70" y="154">+String id</text>
    <text class="text" x="70" y="178">+String email</text>
    <text class="text" x="70" y="202">+String nombre</text>
    <text class="text" x="70" y="226">+String apellido</text>
    <text class="text" x="70" y="250">+String numeroPasaporte</text>
  </g>

  <g id="TicketEntity">
    <rect class="box" x="50" y="360" width="310" height="240"/>
    <rect class="head" x="50" y="360" width="310" height="46"/>
    <text class="title" x="205" y="390" text-anchor="middle">TicketEntity</text>
    <text class="text" x="70" y="434">+String id</text>
    <text class="text" x="70" y="458">+String idUsuario</text>
    <text class="text" x="70" y="482">+String idPartido</text>
    <text class="text" x="70" y="506">+String idSector</text>
    <text class="text" x="70" y="530">+number cantidad</text>
    <text class="text" x="70" y="554">+number precioTotal</text>
    <text class="text" x="70" y="578">+TicketStatus estado</text>
  </g>

  <g id="PartidoEntidad">
    <rect class="box" x="50" y="690" width="310" height="190"/>
    <rect class="head" x="50" y="690" width="310" height="46"/>
    <text class="title" x="205" y="720" text-anchor="middle">PartidoEntidad</text>
    <text class="text" x="70" y="764">+String id</text>
    <text class="text" x="70" y="788">+String equipoLocal</text>
    <text class="text" x="70" y="812">+String equipoVisitante</text>
    <text class="text" x="70" y="836">+String fechaPartido</text>
    <text class="text" x="70" y="860">+String nombreEstadio</text>
  </g>

  <g id="EntradasService" class="service">
    <rect class="box" x="470" y="300" width="340" height="250"/>
    <rect class="head" x="470" y="300" width="340" height="46"/>
    <text class="title" x="640" y="330" text-anchor="middle">EntradasService</text>
    <text class="text" x="490" y="374">-IEntradasRepository entradasRepository</text>
    <text class="text" x="490" y="398">-TicketStateFactory ticketStateFactory</text>
    <text class="text" x="490" y="422">-PaymentsService paymentsService</text>
    <line x1="470" y1="444" x2="810" y2="444" stroke="#ea580c" stroke-width="1.5"/>
    <text class="text" x="490" y="476">+crear(dto)</text>
    <text class="text" x="490" y="500">+obtenerTodas()</text>
    <text class="text" x="490" y="524">+pagar(id)</text>
  </g>

  <g id="PaymentsService" class="service">
    <rect class="box" x="470" y="650" width="340" height="170"/>
    <rect class="head" x="470" y="650" width="340" height="46"/>
    <text class="title" x="640" y="680" text-anchor="middle">PaymentsService</text>
    <text class="text" x="490" y="724">-IPaymentStrategy strategy</text>
    <line x1="470" y1="744" x2="810" y2="744" stroke="#ea580c" stroke-width="1.5"/>
    <text class="text" x="490" y="774">+useProvider(provider)</text>
    <text class="text" x="490" y="798">+processTicketPayment(...)</text>
  </g>

  <g id="NotificationsService" class="service">
    <rect class="box" x="470" y="870" width="340" height="110"/>
    <rect class="head" x="470" y="870" width="340" height="46"/>
    <text class="title" x="640" y="900" text-anchor="middle">NotificationsService</text>
    <text class="text" x="490" y="944">+handleTicketPagado(payload)</text>
  </g>

  <g id="IEntradasRepository" class="iface">
    <rect class="box" x="900" y="85" width="350" height="170"/>
    <rect class="head" x="900" y="85" width="350" height="58"/>
    <text class="stereo" x="1075" y="108" text-anchor="middle">&lt;&lt;interface&gt;&gt;</text>
    <text class="title" x="1075" y="132" text-anchor="middle">IEntradasRepository</text>
    <text class="text" x="920" y="172">+crear(datos)</text>
    <text class="text" x="920" y="196">+obtenerTodas()</text>
    <text class="text" x="920" y="220">+actualizarEstado(id, estado)</text>
  </g>

  <g id="TicketStateFactory">
    <rect class="box" x="900" y="315" width="350" height="100"/>
    <rect class="head" x="900" y="315" width="350" height="46"/>
    <text class="title" x="1075" y="345" text-anchor="middle">TicketStateFactory</text>
    <text class="text" x="920" y="389">+create(status)</text>
  </g>

  <g id="TicketState" class="iface">
    <rect class="box" x="900" y="465" width="350" height="155"/>
    <rect class="head" x="900" y="465" width="350" height="58"/>
    <text class="stereo" x="1075" y="488" text-anchor="middle">&lt;&lt;interface&gt;&gt;</text>
    <text class="title" x="1075" y="512" text-anchor="middle">TicketState</text>
    <text class="text" x="920" y="552">+pagar(...)</text>
    <text class="text" x="920" y="576">+confirmarPago()</text>
    <text class="text" x="920" y="600">+cancelar()</text>
  </g>

  <g id="IPaymentStrategy" class="iface">
    <rect class="box" x="900" y="685" width="350" height="145"/>
    <rect class="head" x="900" y="685" width="350" height="58"/>
    <text class="stereo" x="1075" y="708" text-anchor="middle">&lt;&lt;interface&gt;&gt;</text>
    <text class="title" x="1075" y="732" text-anchor="middle">IPaymentStrategy</text>
    <text class="text" x="920" y="772">+processPayment(...)</text>
    <text class="text" x="920" y="796">+verifyPayment(transactionId)</text>
  </g>

  <g id="QrService" class="service">
    <rect class="box" x="900" y="890" width="350" height="90"/>
    <rect class="head" x="900" y="890" width="350" height="46"/>
    <text class="title" x="1075" y="920" text-anchor="middle">QrService</text>
    <text class="text" x="920" y="964">+generarQrBase64(ticketId)</text>
  </g>

  <g id="SupabaseEntradasRepository" class="impl">
    <rect class="box" x="1340" y="85" width="390" height="145"/>
    <rect class="head" x="1340" y="85" width="390" height="46"/>
    <text class="title" x="1535" y="115" text-anchor="middle">SupabaseEntradasRepository</text>
    <text class="text" x="1360" y="159">+crear(datos)</text>
    <text class="text" x="1360" y="183">+obtenerTodas()</text>
    <text class="text" x="1360" y="207">+actualizarEstado(id, estado)</text>
  </g>

  <g id="States" class="impl">
    <rect class="box" x="1340" y="365" width="390" height="190"/>
    <rect class="head" x="1340" y="365" width="390" height="46"/>
    <text class="title" x="1535" y="395" text-anchor="middle">Estados concretos</text>
    <text class="text" x="1360" y="439">ReservadoState</text>
    <text class="text" x="1360" y="463">+pagar()  +confirmarPago()  +cancelar()</text>
    <text class="text" x="1360" y="499">PagadoState</text>
    <text class="text" x="1360" y="523">CanceladoState</text>
  </g>

  <g id="PaymentStrategies" class="impl">
    <rect class="box" x="1340" y="655" width="390" height="145"/>
    <rect class="head" x="1340" y="655" width="390" height="46"/>
    <text class="title" x="1535" y="685" text-anchor="middle">Estrategias de pago</text>
    <text class="text" x="1360" y="729">MercadoPagoStrategy</text>
    <text class="text" x="1360" y="753">SimulatedPaymentStrategy</text>
    <text class="text" x="1360" y="777">+processPayment()  +verifyPayment()</text>
  </g>

  <path class="rel" d="M 205 270 V 360"/>
  <text class="label" x="214" y="292">1</text>
  <text class="label" x="214" y="350">0..*</text>
  <path class="rel" d="M 205 690 V 600"/>
  <text class="label" x="214" y="672">1</text>
  <text class="label" x="214" y="614">0..*</text>

  <path class="dep" d="M 360 480 H 470"/>
  <path class="dep" d="M 810 365 H 900"/>
  <path class="dep" d="M 810 425 H 865 V 365 H 900"/>
  <path class="dep" d="M 810 485 H 865 V 735 H 470"/>
  <path class="dep" d="M 810 735 H 900"/>
  <path class="dep" d="M 810 925 H 900"/>
  <path class="dep" d="M 810 925 H 865 V 520 H 360"/>

  <path class="gen" d="M 1340 155 H 1250"/>
  <path class="gen" d="M 1340 460 H 1250"/>
  <path class="gen" d="M 1340 735 H 1250"/>

  <path class="dep" d="M 810 355 H 865 V 170 H 900"/>
  <path class="dep" d="M 1250 365 H 1295 V 525 H 1250"/>
  <path class="rel" d="M 360 535 H 865 V 542 H 900"/>
  <text class="label" x="790" y="532">estado actual</text>
</svg>
