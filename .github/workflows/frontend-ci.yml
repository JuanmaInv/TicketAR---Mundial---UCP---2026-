name: Frontend CI (Next.js)

on:
  push:
    branches: [ "main", "feat/**", "RAMA-INTEGRACION-BACKEND" ]
  pull_request:
    branches: [ "main", "RAMA-INTEGRACION-BACKEND" ]

jobs:
  validacion:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend-client

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Instalar pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: ./frontend-client/pnpm-lock.yaml

      - name: Instalar dependencias
        run: pnpm install

      - name: Ejecutar linter
        run: pnpm run lint

      - name: Compilar proyecto
        run: pnpm run build

      - name: Instalar navegadores Playwright
        run: pnpm exec playwright install --with-deps chromium

      - name: Ejecutar pruebas E2E
        run: pnpm exec playwright test --project=chromium
