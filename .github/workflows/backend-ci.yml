name: Backend CI (NestJS)

# CI integrada a todas las ramas (main y funcionales).

on:
  push:
    branches: [ "main", "feat/**", "RAMA-INTEGRACION-BACKEND" ]
  pull_request:
    branches: [ "main", "RAMA-INTEGRACION-BACKEND" ]

jobs:
  validacion:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend-nest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Activar pnpm con Corepack
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - name: Instalar dependencias
        run: pnpm install

      - name: Compilar proyecto (Build)
        run: pnpm run build

      - name: Ejecutar Linter (Estilo de código)
        run: pnpm run lint

      - name: Ejecutar Tests Unitarios
        run: pnpm run test
